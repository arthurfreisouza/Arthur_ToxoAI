<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Login/Register Forms -->
        <div id="auth-section" class="auth-section">
            <div class="form-container">
                <div class="form-tabs">
                    <button class="tab-btn active" onclick="showLogin()">Login</button>
                    <button class="tab-btn" onclick="showRegister()">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <h2>Welcome Back</h2>
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                    <div id="login-error" class="error-message"></div>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form">
                    <h2>Create Account</h2>
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input type="text" id="register-username" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="your.email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" placeholder="Create a secure password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                    <div id="register-error" class="error-message"></div>
                    <div id="register-success" class="success-message"></div>
                </form>
            </div>
        </div>

        <!-- Choice Selection Screen (shown after login) -->
        <div id="choice-section" class="choice-section" style="display: none;">
            <div class="choice-container">
                <div class="choice-header">
                    <h1>Select Test Type</h1>
                    <p>Choose the medical test you'd like to perform</p>
                </div>

                <div class="choice-cards">
                    <!-- HIV Card -->
                    <div class="choice-card" onclick="selectTestType('HIV')">
                        <div class="card-icon hiv-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                                <path d="M12 6v12M6 12h12"/>
                            </svg>
                        </div>
                        <h2>HIV Testing</h2>
                        <p>Comprehensive HIV screening and analysis</p>
                        <div class="card-arrow">→</div>
                    </div>

                    <!-- Cancer Card -->
                    <div class="choice-card" onclick="selectTestType('Cancer')">
                        <div class="card-icon cancer-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="8"/>
                                <path d="M12 4v16M4 12h16"/>
                                <circle cx="12" cy="12" r="2" fill="currentColor"/>
                            </svg>
                        </div>
                        <h2>Cancer Screening</h2>
                        <p>Early detection and risk assessment screening</p>
                        <div class="card-arrow">→</div>
                    </div>
                </div>

                <button onclick="logout()" class="btn btn-logout">Logout</button>
            </div>
        </div>

        <!-- User Dashboard (shown after login) -->
        <div id="dashboard-section" class="dashboard-section" style="display: none;">
            <div class="dashboard-container">
                <h1>User Dashboard</h1>
                <div class="user-card">
                    <div class="user-info">
                        <h2>Welcome, <span id="user-username"></span>!</h2>
                        <p><strong>Email:</strong> <span id="user-email"></span></p>
                        <p><strong>User ID:</strong> <span id="user-id"></span></p>
                        <p><strong>Status:</strong> <span id="user-status" class="status-active">Active</span></p>
                    </div>
                    <button onclick="logout()" class="btn btn-logout">Logout</button>
                </div>
                <div id="dashboard-error" class="error-message"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
