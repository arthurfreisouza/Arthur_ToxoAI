<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxoAI — HIV Testing Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ── Toast container ───────────────────────────────────────────── -->
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <!-- ── Auth Page ──────────────────────────────────────────────────── -->
    <div id="auth-page" class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-icon">🧬</div>
                <h1 class="brand-name">ToxoAI</h1>
                <p class="brand-tagline">HIV Testing Assistant</p>
            </div>

            <div class="tab-strip">
                <button class="tab-btn active" id="tab-login" onclick="showLogin()">Sign In</button>
                <button class="tab-btn" id="tab-register" onclick="showRegister()">Register</button>
            </div>

            <!-- Login form -->
            <form id="login-form" class="auth-form active" novalidate>
                <div class="field">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" autocomplete="email"
                           placeholder="you@example.com" required>
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" autocomplete="current-password"
                           placeholder="Your password" required>
                </div>
                <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
                <div id="login-msg" class="form-msg"></div>
            </form>

            <!-- Register form -->
            <form id="register-form" class="auth-form" novalidate>
                <div class="field">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" autocomplete="username"
                           placeholder="3–30 chars, letters/numbers/hyphens" required>
                </div>
                <div class="field">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" autocomplete="email"
                           placeholder="you@example.com" required>
                </div>
                <div class="field">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" autocomplete="new-password"
                           placeholder="At least 8 characters" required>
                </div>
                <button type="submit" class="btn-primary" id="register-btn">Create Account</button>
                <div id="register-msg" class="form-msg"></div>
            </form>
        </div>
    </div>

    <!-- ── App Shell ──────────────────────────────────────────────────── -->
    <div id="app-page" class="app-page" style="display:none;">

        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <!-- Mobile: hamburger to toggle sidebar -->
                <button class="btn-hamburger" id="hamburger-btn"
                        onclick="toggleSidebar()" title="Toggle documents panel"
                        aria-label="Toggle sidebar">
                    <span></span><span></span><span></span>
                </button>
                <span class="app-logo">🧬 ToxoAI</span>
            </div>
            <div class="header-right">
                <button class="btn-new-chat" onclick="newChat()" title="New conversation">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    <span class="new-chat-label">New Chat</span>
                </button>
                <span class="online-dot" title="Connected"></span>
                <span id="header-username" class="header-username"></span>
                <button class="btn-logout" onclick="logout()" title="Sign out">Sign out</button>
            </div>
        </header>

        <div class="app-body">

            <!-- Sidebar overlay (mobile) -->
            <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-inner">
                    <h2 class="sidebar-heading">Documents</h2>
                    <p class="sidebar-hint">
                        Upload PDFs or text files to give the assistant context from your own documents.
                    </p>

                    <div id="doc-list" class="doc-list">
                        <p class="doc-empty">No documents yet.</p>
                    </div>

                    <label class="btn-upload" for="file-input">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        Upload file
                        <input type="file" id="file-input" accept=".pdf,.txt"
                               onchange="uploadDocument(this)" style="display:none;">
                    </label>
                    <p class="upload-hint">PDF or TXT · max 10 MB</p>
                    <div id="upload-msg" class="upload-msg"></div>
                </div>
            </aside>

            <!-- Chat -->
            <main class="chat-main">
                <div id="chat-messages" class="chat-messages">
                    <!-- Welcome state injected by JS -->
                </div>

                <div class="chat-input-bar">
                    <div class="input-wrapper">
                        <textarea
                            id="chat-input"
                            placeholder="Ask a question…"
                            rows="1"
                            onkeydown="handleKey(event)"
                            oninput="handleInput(this)"
                        ></textarea>
                        <button id="send-btn" class="btn-send" onclick="sendMessage()" title="Send (Enter)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                    <p class="disclaimer">
                        ToxoAI provides educational information only — always consult a healthcare professional for personal medical advice.
                    </p>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
